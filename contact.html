    <main>
       <div class="contact-h2">
            <h2>Contact Us - Construction Services</h2>
       </div> 
        <form action="submit.php" method="POST" class="contact-form">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

            <label>Interests:</label>
            <input type="checkbox" id="residential" name="interests" value="residential">
            <label for="residential">Residential Projects</label>
            <input type="checkbox" id="commercial" name="interests" value="commercial">
            <label for="commercial">Commercial Projects</label>

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
                <option value="UK">UK</option>
                <option value="Australia">Australia</option>
            </select>

            <input type="submit" value="Submit">
        </form>
